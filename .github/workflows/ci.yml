name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore msbuild-extractor-sample.csproj

      - name: Build (Debug)
        run: dotnet build msbuild-extractor-sample.csproj --configuration Debug --no-restore -warnaserror

      - name: Build (Release)
        run: dotnet build msbuild-extractor-sample.csproj --configuration Release --no-restore -warnaserror
